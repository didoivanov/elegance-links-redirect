name: Release on version bump

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read plugin version
        id: version
        run: |
          VERSION=$(grep -E '^\s*\*\s*Version:' elegance-links-redirect.php | head -1 | sed -E 's/.*Version:[[:space:]]*//' | tr -d ' \r\n')
          if [ -z "$VERSION" ]; then
            echo "Could not parse Version from plugin header" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "Detected plugin version: $VERSION"

      - name: Skip if tag already exists
        id: check
        run: |
          if git rev-parse "refs/tags/${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists; nothing to do."
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build release zip
        if: steps.check.outputs.exists == 'false'
        run: |
          STAGE="$(mktemp -d)/elegance-links-redirect"
          mkdir -p "$STAGE"
          rsync -a --exclude='.git' --exclude='.github' --exclude='*.zip' ./ "$STAGE/"
          (cd "$(dirname "$STAGE")" && zip -rq "$GITHUB_WORKSPACE/elegance-links-redirect.zip" elegance-links-redirect)

      - name: Create tag and release
        if: steps.check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: elegance-links-redirect.zip
